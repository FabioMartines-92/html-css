<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Query</title>
    <style>
        /* Estilo geral */
        * {
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        
        }

        html, body {
            height: 100vh;
            width: 100vw;
            padding: 10px;
            background-color: #233eff;
            background-size: contain;
            background-repeat: no-repeat;
        }
        h1 {
            color: white;
            text-align: center;
            margin-top: 20px;
            text-shadow: 2px 2px 0 rgb(7, 7, 139);
            
        }
        /* Estilo Portrait*/

        @media screen and (orientation: portrait) {
        body{
            background-image: url(../mq003/images/cev-portrait.jpg);
            background-position: left bottom;
        }
            
    }

        /* Estilo Landscape*/
       
    @media screen and (orientation: Landscape) {
        
     body {        
    background-image: url(../mq003/images/cev-landscape.jpg);
    background-position: left bottom;
    }
}
    </style>
</head>
<body>
    <h1>Mude a orientacao do seu dispositivo</h1>
</body>
</html>
